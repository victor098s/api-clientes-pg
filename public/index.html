<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciador de Clientes</title>
    <!-- Carrega o CSS da pasta public/ (não colocar "public/" no caminho!) -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="container-header">
        <h1>📋 Gerenciador de Clientes</h1>
        <p class="subtitle">Sistema de Gestão de Clientes</p>
      </div>
    </header>

    <main>
      <div class="container">
        <!-- ============================== -->
        <!-- SEÇÃO DO FORMULÁRIO            -->
        <!-- ============================== -->
        <section class="form-section">
          <h2>Adicionar ou Editar Cliente</h2>
          <form id="clientForm">
            <!-- Campo: Nome -->
            <div class="form-group">
              <label for="nome">Nome Completo:</label>
              <input
                type="text"
                id="nome"
                name="nome"
                placeholder="Ex: João da Silva"
                required
              />
            </div>

            <!-- Campo: CPF -->
            <div class="form-group">
              <label for="cpf">CPF:</label>
              <input
                type="text"
                id="cpf"
                name="cpf"
                placeholder="000.000.000-00"
                required
              />
            </div>
            <!-- Campo: Telefone -->
            <div class="form-group">
              <label for="telefone">Telefone:</label>
              <input
                type="tel"
                id="telefone"
                name="telefone"
                placeholder="(11) 99999-9999"
                required
              />
            </div>

            <!-- Campo: E-mail -->
            <div class="form-group">
              <label for="email">E-mail:</label>
              <input
                type="email"
                id="email"
                name="email"
                placeholder="seu@email.com"
                required
              />
            </div>

            <!-- Campo: Data de Nascimento -->
            <div class="form-group">
              <label for="datanasc">Data de Nascimento:</label>
              <!-- type="date" exibe um seletor de data nativo do navegador -->
              <input type="date" id="datanasc" name="datanasc" required />
            </div>

            <!-- Campos de Endereço: Rua e Número lado a lado -->
            <div class="form-row">
              <div class="form-group flex-3">
                <label for="rua">Rua / Avenida:</label>
                <input
                  type="text"
                  id="rua"
                  name="rua"
                  placeholder="Ex: Av. Paulista"
                  required
                />
              </div>
              <div class="form-group flex-1">
                <label for="numero">Número:</label>
                <input
                  type="number"
                  id="numero"
                  name="numero"
                  placeholder="Ex: 1000"
                  required
                />
              </div>
            </div>

            <!-- Campos de Endereço: Complemento e Bairro lado a lado -->
            <div class="form-row">
              <div class="form-group flex-1">
                <label for="casa">Complemento:</label>
                <!-- Complemento é opcional -->
                <input
                  type="text"
                  id="casa"
                  name="casa"
                  placeholder="Apto 12, Casa B..."
                />
              </div>
              <div class="form-group flex-2">
                <label for="bairro">Bairro:</label>
                <input
                  type="text"
                  id="bairro"
                  name="bairro"
                  placeholder="Ex: Centro"
                  required
                />
              </div>
            </div>

            <!-- Botões de ação do formulário -->
            <div class="form-buttons">
              <button type="submit" class="btn btn-primary">
                Salvar Cliente
              </button>
              <button type="button" class="btn btn-secondary" id="btnLimpar">
                Limpar Formulário
              </button>
            </div>
          </form>
        </section>

        <!-- ============================== -->
        <!-- SEÇÃO DE LISTAGEM              -->
        <!-- ============================== -->
        <section class="list-section">
          <h2>Lista de Clientes</h2>

          <!-- Controles: recarregar e pesquisar -->
          <div class="list-controls">
            <button class="btn btn-success" id="btnRecarregar">
              🔄 Recarregar Lista
            </button>
            <div class="search-box">
              <select id="searchType" title="Tipo de busca">
                <option value="nome">Buscar por Nome</option>
                <option value="id">Buscar por ID</option>
              </select>
              <input
                type="text"
                id="searchInput"
                placeholder="Digite o valor para buscar..."
              />
              <button class="btn btn-primary" id="btnBuscar">Buscar</button>
            </div>
          </div>

          <!-- Mensagem de carregando -->
          <div id="loadingMessage" class="message message-info">
            Carregando clientes...
          </div>

          <!-- Mensagem de lista vazia -->
          <div id="emptyMessage" class="message message-info">
            Nenhum cliente cadastrado.
          </div>
          <!-- Tabela será gerada pelo script.js -->
          <div id="clientsList" class="clients-table-container"></div>
        </section>
      </div>
    </main>
    <div id="modalMessage" class="modal-message">
      <div class="modal-content">
        <p id="modalText"></p>
        <button class="btn btn-primary" onclick="fecharModal()">Fechar</button>
      </div>
    </div>

    <footer>
      <p>© 2026 - Sistema de Gestão de Clientes</p>
    </footer>

    <!-- Modal de Mensagens (feedback ao usuário) -->

    <!-- Script.js carregado no final do body para garantir que
       o HTML já esteja montado antes do JS executar -->
    <script src="script.js"></script>
  </body>
</html>
